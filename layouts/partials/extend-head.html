{{ $author := site.Language.Params.author }}
{{ $siteDescription := site.Language.Params.description }}
{{ $siteTitle := site.Title }}
{{ $personID := printf "%s#person" site.BaseURL }}

<meta name="author" content="{{ $author.name }}">
<meta name="keywords" content="machine learning, CUDA, systems engineering, neural networks, performance engineering, Danial Jafarzadeh">
<meta property="og:site_name" content="{{ $siteTitle }}">
<meta property="og:locale" content="en_US">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "@id": "{{ $personID }}",
  "name": "{{ $author.name }}",
  "url": "{{ site.BaseURL }}",
  "email": "{{ $author.email }}",
  "image": "{{ "img/vampire.png" | absURL }}",
  "jobTitle": "Machine Learning and Systems Engineer",
  "description": "{{ $author.bio }}",
  "sameAs": [
    "https://github.com/Danialjfz"
  ],
  "knowsAbout": [
    "Machine Learning",
    "Deep Learning",
    "CUDA",
    "GPU Programming",
    "Systems Engineering",
    "Performance Optimization"
  ],
  "knowsLanguage": [
    {
      "@type": "Language",
      "name": "English"
    }
  ]
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ $siteTitle }}",
  "url": "{{ site.BaseURL }}",
  "description": "{{ $siteDescription }}",
  "inLanguage": "en-US",
  "author": {
    "@type": "Person",
    "@id": "{{ $personID }}"
  },
  "publisher": {
    "@type": "Person",
    "@id": "{{ $personID }}"
  }
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Blog",
  "name": "{{ $siteTitle }}",
  "url": "{{ "posts/" | absURL }}",
  "description": "{{ $siteDescription }}",
  "inLanguage": "en-US",
  "author": {
    "@type": "Person",
    "@id": "{{ $personID }}"
  },
  "publisher": {
    "@type": "Person",
    "@id": "{{ $personID }}"
  }
}
</script>
